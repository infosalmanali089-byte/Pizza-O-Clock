<span style="display: inline-flex; align-items: center; gap: 0.3rem;">
    {% if rating == 0 %}
        <span style="color: #a8a29e; font-size: 0.85rem;">Unrated</span>
    {% else %}
        {% for i in "12345" %}
            {% if forloop.counter <= rating %}
                <i class="fa fa-star" style="color: #f59e0b;" aria-hidden="true"></i>
            {% else %}
                <i class="fa fa-star" style="color: #3d3836;" aria-hidden="true"></i>
            {% endif %}
        {% endfor %}
        <span style="color: #a8a29e; font-size: 0.85rem;">({{ rating }}/5)</span>
    {% endif %}
</span>
